<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暴雨小英雄：超級任務</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* 全域繁體標準黑體與防反白防游標優化 */
        body, button, div, h1, h2, h3, span, p {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", "PingFang TC", "Noto Sans CJK TC", sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        body { 
            background: #2563eb; 
            margin: 0; 
            padding: 0;
            overflow: hidden;
        }
        /* 帶有動態下雨背景的草地棋盤 */
        .world-map { 
            background: #22c55e; 
            background-image: radial-gradient(#16a34a 25%, transparent 25%);
            background-size: 24px 24px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.4);
            position: relative;
        }
        /* Q彈浮動動畫 */
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.1); }
        }
        .hero-bounce { animation: bounce-slow 1s infinite ease-in-out; }
        
        /* 模擬下雨背景 */
        .rain-bg {
            position: absolute; width: 100%; height: 100%;
            background: linear-gradient(transparent, rgba(255,255,255,0.05));
            pointer-events: none; z-index: 1;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 內建網頁原生音效系統 (Web Audio API) ---
        const playSound = (type) => {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'dice') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(800, ctx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.05, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                } else if (type === 'correct') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08); // E5
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16); // G5
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(180, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.25);
                } else if (type === 'hit') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.05);
                } else if (type === 'win') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                    osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.1);
                    osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.2);
                    osc.frequency.setValueAtTime(1046.5, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.12, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.5);
                } else if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(500, ctx.currentTime + 0.05);
                    gain.gain.setValueAtTime(0.05, ctx.currentTime);
                    osc.start(); osc.stop(ctx.currentTime + 0.05);
                }
            } catch (e) { console.log(e); }
        };

        // --- 防災降雨安全知識庫 ---
        const QUIZZES = [
            { q: "氣象測站測得多少降雨量，才算正式「下雨」？", a: "0.1 毫米 (mm) 或以上", options: ["0.1 毫米 (mm) 或以上", "1.0 毫米 (mm)", "5.0 毫米 (mm)"], fact: "只要測站測到 0.1mm 以上，在氣象統計上就算有降雨發生囉！" },
            { q: "預報寫降雨機率 100% 代表什麼意思？", a: "降雨機率大於 95%", options: ["代表雨會下得超級大", "每一秒、每個角落都在下雨", "降雨機率大於 95%"], fact: "降雨機率是指下雨的「可能性」。100% 是四捨五入後的結果，表示機率大於 95%。" },
            { q: "如果降雨機率預報是 0%，當天還會下雨嗎？", a: "仍有 1% - 4% 的小機會下雨", options: ["絕對百分之百大太陽", "仍有 1% - 4% 的小機會下雨", "天空會掉下隕石"], fact: "0% 也是四捨五入的結果，代表機率小於 5%，因此還是有可能突然飄起細雨喔！" },
            { q: "降雨機率 70% 的真正含意是什麼？", a: "該地區有 70% 的機率會下雨", options: ["有 70% 的地方在下雨", "雨量會比平常多 70%", "該地區有 70% 的機率會下雨"], fact: "降雨機率指的是下雨的「機會」，不代表會下多大，也不代表下雨的面積範圍。" },
            { q: "24小時累積雨量達 80 毫米 (mm) 以上稱為？", a: "大雨", options: ["大雨", "豪雨", "大豪雨"], fact: "24小時累積雨量達 80mm 以上，或時雨量達 40mm 以上，氣象局就會發布大雨特報。" },
            { q: "24小時累積雨量達多少毫米 (mm) 以上才會稱為「豪雨」？", a: "200 毫米 (mm)", options: ["100 毫米 (mm)", "200 毫米 (mm)", "500 毫米 (mm)"], fact: "達 200mm 以上稱為豪雨；達 350mm 稱為大豪雨，500mm 以上則是超大豪雨！" },
            { q: "雷雨天走在路上，應特別避開哪裡防止導電與濕滑危險？", a: "變電箱與鐵製水溝蓋", options: ["泥巴草地和花園", "變電箱與鐵製水溝蓋", "木製公車候車亭"], fact: "積水非常容易導電！而且雨天的鐵蓋、斜坡十分濕滑，是馬路上隱藏的危險陷阱！" },
            { q: "雨天路上的水坑，為什麼常常讓人踩空跌倒？", a: "光線折射讓人誤判深度", options: ["水坑裡有怪獸在拉腳", "光線折射讓人誤判深度", "雨水會把路面融化"], fact: "積水表面會產生光線折射與視線死角，讓人無法從外面看清積水的真正深度。" },
            { q: "若車輛要通過積水地區，水深超過哪裡就絕對不能強行通過？", a: "輪胎的一半高度", options: ["淹到門把", "淹到車頂", "輪胎的一半高度"], fact: "水深如果超過輪胎一半，雨水容易灌進排氣管導致熄火，會讓人受困水中！" },
            { q: "看到原本清澈的溪水突然變得「非常混濁」代表什麼？", a: "溪水上游可能爆發山洪", options: ["有大群魚兒在翻滾", "溪水上游可能爆發山洪", "天氣準備要變晴朗了"], fact: "這是山洪與土石流爆發前最危險的警訊，必須立刻往垂直流向的兩側高處逃生！" },
            { q: "打雷暴雨時，在室內做什麼事情比較安全？", a: "玩免插電的掌上遊戲機", options: ["講接線的有線市話", "在洗澡水槽洗手洗澡", "玩免插電的掌上遊戲機"], fact: "閃電突波可能會透過實體有線迴路（如市話線、水管）傳導，所以室內也要注意防雷！" },
            { q: "如果預報發布「豪雨特報」，出門裝裝備該怎麼選擇？", a: "亮亮雨衣與高筒防護雨鞋", options: ["亮亮雨衣與高筒防護雨鞋", "一把普通的抗UV遮陽傘", "不穿雨衣直接衝過去"], fact: "豪雨視線極差、斜坡濕滑，穿亮色雨衣能提高能見度，防護雨鞋則可防止涉水滑倒。" }
        ];

        // 8 個可愛童趣英雄
        const CHARS = [
            { id: 1, icon: '👦', name: '小健' }, { id: 2, icon: '👧', name: '小晴' },
            { id: 3, icon: '🐱', name: '波波' }, { id: 4, icon: '🤖', name: '雷達兵' },
            { id: 5, icon: '🐰', name: '兔兔' }, { id: 6, icon: '🦖', name: '阿龍' },
            { id: 7, icon: '🐑', name: '咩咩' }, { id: 8, icon: '🐸', name: '呱呱' }
        ];

        // 附加特殊技能裝備
        const GEARS = [
            { id: 1, icon: '👢', name: '防護雨鞋', skill: '穩健前進：每次答對擲骰子保底前進 2 步' },
            { id: 2, icon: '🦺', name: '亮亮雨衣', skill: '亮眼高分：小遊戲過關時額外獲得 100 積分' },
            { id: 3, icon: '☂️', name: '神奇雨傘', skill: '智慧提示：答錯時自動排除一個錯誤答案' }
        ];

        // 大富翁 S型 12 格關卡地圖 (3x4 網格佈局順序)
        const MAP_CELLS = [
            { id: 0, name: "起點站", gridIdx: 0 }, { id: 1, name: "下雨定義", gridIdx: 1 }, { id: 2, name: "100%機率", gridIdx: 2 },
            { id: 5, name: "大雨特報", gridIdx: 5 }, { id: 4, name: "70%含意", gridIdx: 4 }, { id: 3, name: "0%祕密", gridIdx: 3 },
            { id: 6, name: "豪雨定義", gridIdx: 6 }, { id: 7, name: "路上防電", gridIdx: 7 }, { id: 8, name: "水坑折射", gridIdx: 8 },
            { id: 11, name: "終點安全島", gridIdx: 11 }, { id: 10, name: "山洪警訊", gridIdx: 10 }, { id: 9, name: "涉水極限", gridIdx: 9 }
        ].sort((a, b) => a.id - b.id);

        // 修改遊戲類型池，將 'RPS' 換成 'GREEN_LIGHT'
        const GAME_TYPES = ['MOLE', 'AVOID', 'DART', 'GREEN_LIGHT'];

        function App() {
            // --- 狀態宣告 ---
            const [view, setView] = useState('START'); 
            const [isDoubleMode, setIsDoubleMode] = useState(false);
            const [currentPlayer, setCurrentPlayer] = useState(1); 

            // 玩家獨立狀態
            const [p1, setP1] = useState({ char: null, gear: null, level: 0, score: 0 });
            const [p2, setP2] = useState({ char: null, gear: null, level: 0, score: 0 });

            const [diceValue, setDiceValue] = useState(null);
            const [isRolling, setIsRolling] = useState(false);
            const [showQuiz, setShowQuiz] = useState(false);
            const [feedback, setFeedback] = useState(null);
            const [gameType, setGameType] = useState('MOLE');
            const [targetLevel, setTargetLevel] = useState(0);

            // 小遊戲與特殊裝備狀態
            const [disabledOptions, setDisabledOptions] = useState([]);
            const [clickCount, setClickCount] = useState(0);
            const [moles, setMoles] = useState(Array(6).fill(false)); 
            const [hitEffect, setHitEffect] = useState(Array(6).fill(false)); 
            const [obstacleLane, setObstacleLane] = useState(1); // 0左, 1中, 2右
            const [obstaclePos, setObstaclePos] = useState({ lane: 0, y: -20, type: '🌊' }); 
            const [dartX, setDartX] = useState(50);
            const [dartDir, setDartDir] = useState(1); 
            
            // 新增 123木頭人專用狀態：true 為綠燈(安全)，false 為紅燈(危險暴雨)
            const [isGreenLight, setIsGreenLight] = useState(true);

            const activeP = currentPlayer === 1 ? p1 : p2;
            const setActiveP = currentPlayer === 1 ? setP1 : setP2;

            // --- 點擊過關核心判定 ---
            const addProgress = (amt = 1) => {
                setClickCount(prev => {
                    const nextCount = prev + amt;
                    if (nextCount >= 10) {
                        setTimeout(() => {
                            handleMiniGameWin();
                        }, 100);
                        return 10;
                    }
                    return nextCount;
                });
            };

            // --- 擲骰子機制 ---
            const triggerDiceRoll = () => {
                setIsRolling(true);
                let count = 0;
                const interval = setInterval(() => {
                    playSound('dice');
                    const steps = activeP.gear?.id === 1 ? 2 : Math.floor(Math.random() * 2) + 1;
                    setDiceValue(steps);
                    count++;
                    if (count > 6) {
                        clearInterval(interval);
                        setIsRolling(false);
                        
                        let nextLvl = activeP.level + steps;
                        if (nextLvl >= MAP_CELLS.length - 1) nextLvl = MAP_CELLS.length - 1;
                        setTargetLevel(nextLvl);

                        const nextGame = GAME_TYPES[Math.floor(Math.random() * GAME_TYPES.length)];
                        setGameType(nextGame);
                        setClickCount(0);
                        
                        setTimeout(() => {
                            if (nextGame === 'MOLE') setView('GAME_MOLE');
                            if (nextGame === 'AVOID') { setObstacleLane(1); setObstaclePos({ lane: Math.floor(Math.random() * 3), y: 0, type: '🌊' }); setView('GAME_AVOID'); }
                            if (nextGame === 'DART') { setDartX(50); setView('GAME_DART'); }
                            if (nextGame === 'GREEN_LIGHT') { setIsGreenLight(true); setView('GAME_GREEN_LIGHT'); }
                        }, 800);
                    }
                }, 120);
            };

            // --- 答題系統邏輯 ---
            const handleAnswer = (selected, idx) => {
                const currentQuiz = QUIZZES[activeP.level % QUIZZES.length];
                if (selected === currentQuiz.a) {
                    playSound('correct');
                    setFeedback({ ok: true, fact: currentQuiz.fact });
                    setActiveP(p => ({ ...p, score: p.score + 100 }));
                } else {
                    if (activeP.gear?.id === 3 && disabledOptions.length === 0) {
                        playSound('hit');
                        const wrongIdx = currentQuiz.options.findIndex((opt, i) => opt !== currentQuiz.a && i !== idx);
                        if (wrongIdx !== -1) {
                            setDisabledOptions([wrongIdx]);
                            alert("☂️ 神奇雨傘防護罩發動！已幫你排除一個錯誤答案，請再選一次！");
                            return;
                        }
                    }
                    playSound('wrong');
                    setFeedback({ ok: false, fact: currentQuiz.fact });
                }
            };

            const confirmFeedback = () => {
                playSound('click');
                const wasCorrect = feedback.ok;
                setFeedback(null);
                setShowQuiz(false);
                setDisabledOptions([]);

                if (wasCorrect) {
                    triggerDiceRoll();
                } else {
                    switchTurn();
                }
            };

            // 小遊戲挑戰成功
            const handleMiniGameWin = () => {
                playSound('win');
                const bonusScore = activeP.gear?.id === 2 ? 300 : 200;
                
                setActiveP(p => ({ 
                    ...p, 
                    level: targetLevel, 
                    score: p.score + bonusScore 
                }));

                alert(`🎉 特訓大成功！安全積分 +${bonusScore}！`);

                if (targetLevel >= MAP_CELLS.length - 1) {
                    setTimeout(() => setView('END'), 500);
                } else {
                    switchTurn();
                }
            };

            const switchTurn = () => {
                if (isDoubleMode) {
                    setCurrentPlayer(currentPlayer === 1 ? 2 : 1);
                }
                setDiceValue(null);
                setView('MAP');
            };

            // --- [小遊戲 1] 打地鼠時鐘 ---
            useEffect(() => {
                if (view === 'GAME_MOLE') {
                    const timer = setInterval(() => {
                        setMoles(prev => prev.map(() => Math.random() > 0.4));
                    }, 650);
                    return () => clearInterval(timer);
                }
            }, [view]);

            const whackMole = (index) => {
                if (moles[index]) {
                    playSound('hit');
                    addProgress(1);
                    setHitEffect(prev => { const n = [...prev]; n[index] = true; return n; });
                    setMoles(prev => { const n = [...prev]; n[index] = false; return n; });
                    setTimeout(() => {
                        setHitEffect(prev => { const n = [...prev]; n[index] = false; return n; });
                    }, 200);
                }
            };

            // --- [小遊戲 2] 跑道避障時鐘 ---
            useEffect(() => {
                if (view === 'GAME_AVOID') {
                    const timer = setInterval(() => {
                        setObstaclePos(prev => {
                            let nextY = prev.y + 12;
                            if (nextY >= 80 && nextY <= 95) {
                                if (prev.lane === obstacleLane) {
                                    playSound('wrong');
                                    setActiveP(p => ({ ...p, score: Math.max(0, p.score - 15) }));
                                    return { lane: Math.floor(Math.random() * 3), y: 0, type: Math.random() > 0.5 ? '🌊' : '🪨' };
                                } else {
                                    playSound('hit');
                                    addProgress(1.5);
                                    return { lane: Math.floor(Math.random() * 3), y: 0, type: Math.random() > 0.5 ? '🌊' : '🪨' };
                                }
                            }
                            if (nextY > 100) {
                                return { lane: Math.floor(Math.random() * 3), y: 0, type: Math.random() > 0.5 ? '🌊' : '🪨' };
                            }
                            return { ...prev, y: nextY };
                        });
                    }, 140);
                    return () => clearInterval(timer);
                }
            }, [view, obstacleLane]);

            // --- [小遊戲 3] 射飛鏢左右飄移 ---
            useEffect(() => {
                if (view === 'GAME_DART') {
                    const timer = setInterval(() => {
                        setDartX(prev => {
                            let nextX = prev + dartDir * 7;
                            if (nextX > 85) { setDartDir(-1); return 85; }
                            if (nextX < 15) { setDartDir(1); return 15; }
                            return nextX;
                        });
                    }, 50);
                    return () => clearInterval(timer);
                }
            }, [view, dartDir]);

            const launchDart = () => {
                if (dartX >= 44 && dartX <= 56) {
                    playSound('correct');
                    addProgress(3); // 完美準心加高進度
                } else if (dartX >= 25 && dartX <= 75) {
                    playSound('hit');
                    addProgress(1.5);
                } else {
                    playSound('wrong');
                }
            };

            // --- [小遊戲 4] 新增：123木頭人紅綠燈核心計時器 ---
            useEffect(() => {
                if (view === 'GAME_GREEN_LIGHT') {
                    // 每隔 1.2 ~ 2.5 秒隨機切換紅綠燈狀態
                    const switchLight = () => {
                        const nextTimeout = Math.floor(Math.random() * 1300) + 1200;
                        return setTimeout(() => {
                            setIsGreenLight(prev => !prev);
                            playSound('click');
                            timerId = switchLight();
                        }, nextTimeout);
                    };
                    
                    let timerId = switchLight();
                    return () => clearTimeout(timerId);
                }
            }, [view]);

            const stepInWoodman = () => {
                if (isGreenLight) {
                    playSound('hit');
                    addProgress(1); // 綠燈點擊，安全前進 1 格
                } else {
                    playSound('wrong');
                    // 紅燈違規，扣除分數並倒退進度
                    setActiveP(p => ({ ...p, score: Math.max(0, p.score - 20) }));
                    setClickCount(prev => Math.max(0, prev - 1.5));
                }
            };


            // --- 網頁渲染區塊 ---

            // A. 大首頁
            if (view === 'START') return (
                <div className="h-screen w-full flex flex-col items-center justify-center text-white px-4 text-center relative" style={{ background: 'linear-gradient(to bottom, #1e40af, #0369a1)' }}>
                    <div className="rain-bg"></div>
                    <div className="hero-bounce text-8xl mb-4 z-10">⛈️🎒🏃‍♂️</div>
                    <h1 className="text-4xl md:text-5xl font-black text-yellow-300 drop-shadow-[0_4px_0_rgba(0,0,0,0.4)] leading-tight mb-8 z-10">
                        暴雨小英雄<br/><span className="text-xl md:text-2xl text-cyan-200 block mt-2">超級大富翁任務</span>
                    </h1>
                    <button onClick={() => { playSound('click'); setView('MODE'); }} className="z-10 px-12 py-4 bg-amber-400 text-rose-700 rounded-full text-2xl font-black border-b-[8px] border-amber-700 active:border-b-0 active:translate-y-2 transition-all shadow-2xl">
                        進入特訓挑戰!
                    </button>
                </div>
            );

            // B. 選擇模式
            if (view === 'MODE') return (
                <div className="h-screen w-full flex flex-col items-center justify-center text-white px-6" style={{ background: 'linear-gradient(to bottom, #1e40af, #0f172a)' }}>
                    <h2 className="text-3xl font-black text-yellow-300 mb-10 drop-shadow-md">🎮 請選對戰模式</h2>
                    <div className="space-y-6 w-full max-w-xs">
                        <button onClick={() => { playSound('click'); setIsDoubleMode(false); setView('CHAR1'); }} className="w-full py-4 bg-sky-500 rounded-2xl text-xl font-black border-b-[6px] border-sky-700 active:translate-y-1 active:border-b-2 transition-all text-center shadow-lg">
                            👤 單人防災特訓
                        </button>
                        <button onClick={() => { playSound('click'); setIsDoubleMode(true); setView('CHAR1'); }} className="w-full py-4 bg-emerald-500 rounded-2xl text-xl font-black border-b-[6px] border-emerald-700 active:translate-y-1 active:border-b-2 transition-all text-center shadow-lg">
                            👥 雙人同屏對抗
                        </button>
                    </div>
                </div>
            );

            // C. 選擇角色
            if (view === 'CHAR1' || view === 'CHAR2') {
                const isP1 = view === 'CHAR1';
                return (
                    <div className="p-6 max-w-md mx-auto h-screen flex flex-col justify-center items-center text-white" style={{ background: 'linear-gradient(to bottom, #1e40af, #0f172a)' }}>
                        <h2 className="text-2xl font-black text-yellow-300 text-center mb-6 drop-shadow-md">
                            {isP1 ? '🔵 玩家 1：請選擇特訓角色' : '🟢 玩家 2：請選擇特訓角色'}
                        </h2>
                        <div className="grid grid-cols-4 gap-3 w-full bg-white/10 p-4 rounded-3xl border border-white/20 shadow-xl">
                            {CHARS.map(item => (
                                <button key={item.id} onClick={() => {
                                    playSound('click');
                                    if(isP1) { setP1({...p1, char: item}); setView('GEAR1'); }
                                    else { setP2({...p2, char: item}); setView('GEAR2'); }
                                }} className="bg-amber-50 p-2.5 rounded-xl border-b-4 border-amber-300 hover:scale-105 active:scale-95 active:border-b-0 transition-all text-center shadow-sm">
                                    <div className="text-4xl mb-1 hero-bounce">{item.icon}</div>
                                    <div className="text-xs font-black text-slate-800 truncate">{item.name}</div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            // D. 挑選裝備
            if (view === 'GEAR1' || view === 'GEAR2') {
                const isP1 = view === 'GEAR1';
                return (
                    <div className="p-6 max-w-md mx-auto h-screen flex flex-col justify-center items-center text-white" style={{ background: 'linear-gradient(to bottom, #1e40af, #0f172a)' }}>
                        <h2 className="text-2xl font-black text-yellow-300 text-center mb-1 drop-shadow-md">
                            {isP1 ? '🎒 玩家 1：請挑選出門裝備' : '🎒 玩家 2：請挑選出門裝備'}
                        </h2>
                        <p className="text-xs text-blue-200 mb-6 font-bold">每種防具配備都有特殊的被動加成技能喔！</p>
                        <div className="space-y-4 w-full">
                            {GEARS.map(item => (
                                <button key={item.id} onClick={() => {
                                    playSound('click');
                                    if(isP1) {
                                        setP1({...p1, gear: item});
                                        if(isDoubleMode) setView('CHAR2');
                                        else setView('MAP');
                                    } else {
                                        setP2({...p2, gear: item});
                                        setView('MAP');
                                    }
                                }} className="w-full bg-white p-4 rounded-2xl border-b-[6px] border-slate-300 active:scale-98 active:border-b-2 transition-all flex items-center gap-4 text-left shadow-md">
                                    <div className="text-4xl bg-amber-100 p-2 rounded-xl">{item.icon}</div>
                                    <div className="flex-1">
                                        <div className="text-md font-black text-slate-800">{item.name}</div>
                                        <div className="text-[11px] text-rose-600 font-bold mt-0.5 leading-tight">{item.skill}</div>
                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            // E. 大富翁核心地圖
            if (view === 'MAP') return (
                <div className="p-3 max-w-md mx-auto h-screen flex flex-col justify-between bg-slate-900">
                    <div className="grid grid-cols-2 gap-2">
                        <div className={`p-2 rounded-xl border-2 transition-all ${currentPlayer === 1 && isDoubleMode ? 'bg-amber-400 border-white text-slate-900 shadow-md' : 'bg-slate-800 border-slate-700 text-white'}`}>
                            <div className="text-xs font-bold flex items-center gap-1">🔵 P1: {p1.char?.icon} {p1.char?.name}</div>
                            <div className="text-[10px] opacity-90 truncate">防具: {p1.gear?.name}</div>
                            <div className="text-sm font-black mt-0.5">{p1.score} 積分 (第 {p1.level} 格)</div>
                        </div>
                        {isDoubleMode ? (
                            <div className={`p-2 rounded-xl border-2 transition-all ${currentPlayer === 2 ? 'bg-amber-400 border-white text-slate-900 shadow-md' : 'bg-slate-800 border-slate-700 text-white'}`}>
                                <div className="text-xs font-bold flex items-center gap-1">🟢 P2: {p2.char?.icon} {p2.char?.name}</div>
                                <div className="text-[10px] opacity-90 truncate">防具: {p2.gear?.name}</div>
                                <div className="text-sm font-black mt-0.5">{p2.score} 積分 (第 {p2.level} 格)</div>
                            </div>
                        ) : (
                            <div className="p-2 rounded-xl bg-slate-800/80 border border-slate-700 text-cyan-300 flex items-center justify-center text-center text-[11px] font-bold">
                                🎯 答對題目 ➔ 擲骰子前進<br/>並通過馬路特訓考驗！
                            </div>
                        )}
                    </div>

                    {isDoubleMode && (
                        <div className="text-center bg-cyan-400 text-slate-900 text-xs font-black py-0.5 rounded-full shadow-sm my-1">
                            🏃‍♂️ 輪到玩家 {currentPlayer} 【{activeP.char?.name}】 的考驗回合
                        </div>
                    )}

                    <div className="world-map flex-1 my-1 rounded-2xl border-[6px] border-emerald-800 p-2 grid grid-cols-3 grid-rows-4 gap-2 relative">
                        {Array(12).fill(0).map((_, gridIndex) => {
                            const cell = MAP_CELLS.find(c => c.gridIdx === gridIndex);
                            if (!cell) return <div key={gridIndex} className="bg-emerald-800/20 rounded-xl"></div>;

                            const hasP1 = p1.level === cell.id;
                            const hasP2 = isDoubleMode && p2.level === cell.id;

                            return (
                                <div 
                                    key={gridIndex}
                                    className={`rounded-xl border-2 flex flex-col items-center justify-center p-1 text-center relative transition-colors
                                        ${hasP1 || hasP2 ? 'bg-yellow-100/90 border-amber-400 shadow-md' : 'bg-emerald-700/40 border-emerald-600/60'}`}
                                >
                                    <div className="absolute inset-0 flex items-center justify-center gap-1 z-20 pointer-events-none">
                                        {hasP1 && <span className="text-3xl hero-bounce drop-shadow-md">{p1.char?.icon}</span>}
                                        {hasP2 && <span className="text-3xl hero-bounce drop-shadow-md">{p2.char?.icon}</span>}
                                    </div>

                                    <div className="text-[11px] font-black text-white bg-slate-900/60 px-1 rounded truncate max-w-full z-10">
                                        {cell.name}
                                    </div>
                                    <div className="text-[9px] text-emerald-100 font-bold z-10 mt-0.5">
                                        {cell.id === 0 ? 'START' : cell.id === 11 ? 'GOAL' : `第 ${cell.id} 關`}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <div className="bg-slate-800 p-2 rounded-xl flex items-center justify-between border border-slate-700">
                        <div className="flex items-center gap-2">
                            <div className="w-12 h-12 bg-amber-400 rounded-xl flex items-center justify-center text-2xl font-black text-slate-900 shadow-lg border-b-4 border-amber-600">
                                {isRolling ? '🌀' : (diceValue || '?')}
                            </div>
                            <div className="text-[11px] text-slate-300 leading-tight font-bold">
                                點擊右側按鈕回答問題<br/>答對便能擲骰子開啟小遊戲！
                            </div>
                        </div>
                        <button 
                            onClick={() => { playSound('click'); setShowQuiz(true); setDisabledOptions([]); }}
                            disabled={isRolling || showQuiz}
                            className="px-6 py-3 bg-gradient-to-r from-rose-500 to-orange-500 text-white rounded-xl text-md font-black shadow-md active:scale-95 disabled:opacity-40"
                        >
                            📝 接受防災挑戰
                        </button>
                    </div>

                    {showQuiz && (
                        <div className="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl p-5 max-w-xs w-full border-t-8 border-sky-500 shadow-2xl text-slate-800">
                                {!feedback ? (
                                    <>
                                        <div className="text-[10px] bg-sky-100 text-sky-700 font-bold px-2 py-0.5 rounded-full w-max mb-2">
                                            🎒 關卡學堂答題任務
                                        </div>
                                        <h3 className="text-sm md:text-base font-black mb-4 leading-snug">
                                            {QUIZZES[activeP.level % QUIZZES.length].q}
                                        </h3>
                                        <div className="space-y-2">
                                            {QUIZZES[activeP.level % QUIZZES.length].options.map((opt, idx) => {
                                                const isExcluded = disabledOptions.includes(idx);
                                                return (
                                                    <button 
                                                        key={idx}
                                                        onClick={() => handleAnswer(opt, idx)}
                                                        disabled={isExcluded}
                                                        className={`w-full text-left p-3 rounded-xl font-bold border transition-all text-sm
                                                            ${isExcluded ? 'bg-slate-100 text-slate-300 line-through border-slate-200' : 'bg-slate-50 text-slate-700 border-slate-200 active:bg-sky-50 active:border-sky-300'}`}
                                                    >
                                                        {idx + 1}. {opt}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </>
                                ) : (
                                    <div className="text-center">
                                        <div className="text-5xl mb-2">{feedback.ok ? '🎉' : '❌'}</div>
                                        <h3 className={`text-xl font-black mb-2 ${feedback.ok ? 'text-emerald-600' : 'text-rose-600'}`}>
                                            {feedback.ok ? '答對了！太厲害了！' : '大殘念！答錯囉！'}
                                        </h3>
                                        <div className="bg-slate-50 p-3 rounded-xl text-xs text-slate-600 border border-slate-100 text-left leading-relaxed mb-4">
                                            <strong>防災小秘訣：</strong>{feedback.fact}
                                        </div>
                                        <button onClick={confirmFeedback} className="w-full py-3 bg-slate-800 text-white font-black rounded-xl text-sm shadow-md active:translate-y-0.5">
                                            {feedback.ok ? '🎲 前進挑戰小遊戲' : '換下位英雄回合 ➔'}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );

            // F. [小遊戲模組 1] 打地鼠時鐘
            if (view === 'GAME_MOLE') return (
                <div className="p-4 max-w-md mx-auto h-screen flex flex-col justify-between text-white" style={{ background: 'linear-gradient(to bottom, #1e3a8a, #0f172a)' }}>
                    <div className="text-center">
                        <span className="text-[10px] bg-rose-500 font-bold px-2 py-0.5 rounded-full">⚡ 關卡特訓 A</span>
                        <h2 className="text-xl font-black mt-1 text-yellow-300">清空雨水下水道！</h2>
                        <p className="text-[11px] text-slate-300 mt-0.5 font-medium leading-tight">落葉跟垃圾把排水孔堵住會淹水！看到冒出的垃圾快點擊清空它！</p>
                    </div>

                    <div className="w-full bg-slate-800/60 border border-slate-700 rounded-2xl p-2 my-2">
                        <div className="text-center text-xs font-bold text-cyan-300 mb-1">排水暢通進度條：{Math.floor(clickCount * 10)}%</div>
                        <div className="w-full h-4 bg-slate-950 rounded-full overflow-hidden border border-slate-800 p-0.5">
                            <div className="h-full bg-gradient-to-r from-cyan-400 to-blue-500 rounded-full transition-all duration-300" style={{ width: `${clickCount * 10}%` }}></div>
                        </div>
                    </div>

                    <div className="grid grid-cols-3 gap-3 bg-slate-900/80 p-4 rounded-2xl border border-slate-800 flex-1 items-center justify-center max-h-[320px]">
                        {moles.map((active, idx) => (
                            <button 
                                key={idx} 
                                onClick={() => whackMole(idx)}
                                className={`aspect-square rounded-2xl border-b-[6px] relative flex flex-col items-center justify-center transition-all shadow-md
                                    ${active ? 'bg-amber-400 border-amber-600 scale-102 active:scale-95' : 'bg-slate-800 border-slate-950 opacity-90'}`}
                            >
                                <div className="text-4xl">{active ? '🍂' : '🕳️'}</div>
                                {hitEffect[idx] && <div className="absolute inset-0 bg-white/30 rounded-2xl animate-ping pointer-events-none"></div>}
                            </button>
                        ))}
                    </div>

                    <div className="text-center text-xs text-rose-300 font-bold animate-pulse py-2">
                        💡 速度要快！集滿 100% 即可安全破關！
                    </div>
                </div>
            );

            // G. [小遊戲模組 2] 跑道避障時鐘
            if (view === 'GAME_AVOID') return (
                <div className="p-4 max-w-md mx-auto h-screen flex flex-col justify-between text-white" style={{ background: 'linear-gradient(to bottom, #1e3a8a, #0f172a)' }}>
                    <div className="text-center">
                        <span className="text-[10px] bg-emerald-500 font-bold px-2 py-0.5 rounded-full">⚡ 關卡特訓 B</span>
                        <h2 className="text-xl font-black mt-1 text-yellow-300">馬路積水與落石避險</h2>
                        <p className="text-[11px] text-slate-300 mt-0.5 font-medium leading-tight">路上遇到深度不明的水坑與落石很危險！切換車道安全閃避！</p>
                    </div>

                    <div className="w-full bg-slate-800/60 border border-slate-700 rounded-2xl p-2 my-1">
                        <div className="text-center text-xs font-bold text-emerald-400 mb-1">避險前進距離：{Math.floor(clickCount * 10)}%</div>
                        <div className="w-full h-4 bg-slate-950 rounded-full overflow-hidden border border-slate-800 p-0.5">
                            <div className="h-full bg-gradient-to-r from-emerald-400 to-teal-500 rounded-full transition-all duration-300" style={{ width: `${clickCount * 10}%` }}></div>
                        </div>
                    </div>

                    <div className="flex-1 bg-slate-950 rounded-2xl border-2 border-slate-800 relative grid grid-cols-3 overflow-hidden shadow-inner my-2 max-h-[320px]">
                        <div className="absolute inset-0 pointer-events-none grid grid-cols-3">
                            <div className="border-r border-dashed border-slate-800 h-full"></div>
                            <div className="border-r border-dashed border-slate-800 h-full"></div>
                        </div>

                        <div className="absolute text-4xl transition-all duration-150 ease-linear" style={{ left: `${obstaclePos.lane * 33.3 + 8}%`, top: `${obstaclePos.y}%` }}>
                            {obstaclePos.type}
                        </div>

                        <div className="absolute bottom-4 text-4xl transition-all duration-200" style={{ left: `${obstacleLane * 33.3 + 8}%` }}>
                            {activeP.char?.icon}
                        </div>
                    </div>

                    <div className="grid grid-cols-3 gap-3 py-2">
                        <button onClick={() => { playSound('click'); setObstacleLane(0); }} className="py-3 bg-slate-800 hover:bg-slate-700 font-black rounded-xl border-b-4 border-slate-950 active:border-b-0 shadow text-sm">⬅️ 左車道</button>
                        <button onClick={() => { playSound('click'); setObstacleLane(1); }} className="py-3 bg-slate-800 hover:bg-slate-700 font-black rounded-xl border-b-4 border-slate-950 active:border-b-0 shadow text-sm">🔼 中車道</button>
                        <button onClick={() => { playSound('click'); setObstacleLane(2); }} className="py-3 bg-slate-800 hover:bg-slate-700 font-black rounded-xl border-b-4 border-slate-950 active:border-b-0 shadow text-sm">➡️ 右車道</button>
                    </div>
                </div>
            );

            // H. [小遊戲模組 3] 射飛鏢左右飄移
            if (view === 'GAME_DART') return (
                <div className="p-4 max-w-md mx-auto h-screen flex flex-col justify-between text-white" style={{ background: 'linear-gradient(to bottom, #1e3a8a, #0f172a)' }}>
                    <div className="text-center">
                        <span className="text-[10px] bg-amber-500 font-bold px-2 py-0.5 rounded-full">⚡ 關卡特訓 C</span>
                        <h2 className="text-xl font-black mt-1 text-yellow-300">固定鬆脫的招牌看板</h2>
                        <p className="text-[11px] text-slate-300 mt-0.5 font-medium leading-tight">強風暴雨會吹落店家招牌！瞄準準心，發射固定釘鎖緊招牌！</p>
                    </div>

                    <div className="w-full bg-slate-800/60 border border-slate-700 rounded-2xl p-2 my-1">
                        <div className="text-center text-xs font-bold text-amber-400 mb-1">招牌穩固進度：{Math.floor(clickCount * 10)}%</div>
                        <div className="w-full h-4 bg-slate-950 rounded-full overflow-hidden border border-slate-800 p-0.5">
                            <div className="h-full bg-gradient-to-r from-amber-400 to-orange-500 rounded-full transition-all duration-300" style={{ width: `${clickCount * 10}%` }}></div>
                        </div>
                    </div>

                    <div className="flex-1 bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col justify-center gap-8 my-2 max-h-[300px]">
                        <div className="w-full bg-slate-950 h-10 rounded-xl relative flex items-center shadow-inner border border-slate-800">
                            <div className="absolute w-[12%] h-full bg-emerald-500 left-[44%] rounded opacity-80 border-x-2 border-white flex items-center justify-center text-[10px] font-black text-white">準心</div>
                            <div className="absolute text-2xl transition-all duration-75" style={{ left: `${dartX}%`, transform: 'translateX(-50%)' }}>🔨</div>
                        </div>

                        <div className="text-center py-4 bg-slate-950/60 rounded-xl border border-slate-800">
                            <div className="text-xs text-slate-400 font-bold">目前工程錘狀態</div>
                            <div className="text-sm font-black text-amber-300 mt-1">
                                {dartX >= 44 && dartX <= 56 ? '🎯 完美對齊！加 30% 進度！' : (dartX >= 25 && dartX <= 75 ? '👍 安全範圍！加 15% 進度！' : '❌ 偏離焦點！敲空囉！')}
                            </div>
                        </div>
                    </div>

                    <button onClick={launchDart} className="w-full py-4 bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 font-black rounded-2xl text-lg shadow-xl border-b-4 border-orange-700 active:translate-y-1 active:border-b-0">
                        🔨 下槌敲擊固定！
                    </button>
                </div>
            );

            // I. [新小遊戲模組 4] 123木頭人紅綠燈畫面
            if (view === 'GAME_GREEN_LIGHT') return (
                <div className="p-4 max-w-md mx-auto h-screen flex flex-col justify-between text-white" style={{ background: 'linear-gradient(to bottom, #1e3a8a, #0f172a)' }}>
                    <div className="text-center">
                        <span className="text-[10px] bg-purple-500 font-bold px-2 py-0.5 rounded-full">⚡ 關卡特訓 D</span>
                        <h2 className="text-xl font-black mt-1 text-yellow-300">安全島 123 木頭人</h2>
                        <p className="text-[11px] text-slate-300 mt-0.5 font-medium leading-tight">安全第一！當雨勢停歇(綠燈)快點前進；當暴雨突襲(紅燈)千萬別亂動！</p>
                    </div>

                    <div className="w-full bg-slate-800/60 border border-slate-700 rounded-2xl p-2 my-1">
                        <div className="text-center text-xs font-bold text-purple-400 mb-1">安全撤離進度：{Math.floor(clickCount * 10)}%</div>
                        <div className="w-full h-4 bg-slate-950 rounded-full overflow-hidden border border-slate-800 p-0.5">
                            <div className="h-full bg-gradient-to-r from-purple-400 to-pink-500 rounded-full transition-all duration-300" style={{ width: `${clickCount * 10}%` }}></div>
                        </div>
                    </div>

                    <div className="flex-1 rounded-2xl border border-slate-800 p-4 flex flex-col items-center justify-center gap-6 my-2 max-h-[300px] transition-all duration-300" style={{ background: isGreenLight ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)' }}>
                        <div className={`w-28 h-28 rounded-full flex flex-col items-center justify-center shadow-2xl text-4xl border-4 transition-all animate-pulse
                            ${isGreenLight ? 'bg-emerald-500 border-emerald-300 text-white' : 'bg-rose-500 border-rose-300 text-white'}`}>
                            {isGreenLight ? '☀️' : '⛈️'}
                            <div className="text-xs font-black mt-1">{isGreenLight ? '雨停!前進' : '暴雨!立定'}</div>
                        </div>

                        <div className="text-center py-2 px-4 bg-slate-950/60 rounded-xl border border-slate-800">
                            <span className="text-xs text-slate-400 font-bold block">當前環境狀態</span>
                            <span className={`text-md font-black block mt-0.5 ${isGreenLight ? 'text-emerald-400' : 'text-rose-400 animate-bounce'}`}>
                                {isGreenLight ? '✅ 天空放晴：趕快安全前進！' : '🚨 突發暴雨：立定別動，點擊會扣分！'}
                            </span>
                        </div>
                    </div>

                    <button 
                        onClick={stepInWoodman}
                        className={`w-full py-4 font-black rounded-2xl text-lg shadow-xl transition-all border-b-4 active:translate-y-1 active:border-b-0
                            ${isGreenLight ? 'bg-emerald-500 border-emerald-700 text-white' : 'bg-rose-600 border-rose-800 text-white'}`}
                    >
                        {isGreenLight ? '🏃‍♂️ 安全前進！' : '🛑 停下別動！'}
                    </button>
                </div>
            );

            // J. 遊戲結束大結算
            if (view === 'END') return (
                <div className="p-6 max-w-md mx-auto h-screen flex flex-col justify-center items-center text-white text-center" style={{ background: 'linear-gradient(to bottom, #1e3a8a, #0369a1)' }}>
                    <div className="text-7xl mb-4 animate-bounce">🏆🏅🎉</div>
                    <h2 className="text-3xl font-black text-yellow-300 drop-shadow-md mb-2">特訓大功告成！</h2>
                    <p className="text-sm text-cyan-100 font-bold mb-8 max-w-xs leading-relaxed">恭喜你順利抵達終點安全島！你已經掌握了全方位的雨天馬路避險與防災安全知識！</p>

                    <div className="w-full bg-slate-900/80 p-5 rounded-3xl border border-slate-800 mb-8 space-y-4 shadow-2xl text-left">
                        <h3 className="text-center font-black text-cyan-300 border-b border-slate-800 pb-2 text-md">📊 暴雨英雄終極成績單</h3>
                        <div className="space-y-2">
                            <div className="flex justify-between items-center bg-slate-950/40 p-2.5 rounded-xl border border-slate-800/60">
                                <span className="font-bold text-sm text-slate-300">🔵 玩家 1 【{p1.char?.name}】</span>
                                <span className="font-black text-amber-400 text-base">{p1.score} 安全積分</span>
                            </div>
                            {isDoubleMode && (
                                <div className="flex justify-between items-center bg-slate-950/40 p-2.5 rounded-xl border border-slate-800/60">
                                    <span className="font-bold text-sm text-slate-300">🟢 玩家 2 【{p2.char?.name}】</span>
                                    <span className="font-black text-amber-400 text-base">{p2.score} 安全積分</span>
                                </div>
                            )}
                        </div>
                    </div>

                    <button onClick={() => { playSound('click'); setP1({char:null,gear:null,level:0,score:0}); setP2({char:null,gear:null,level:0,score:0}); setView('START'); }} className="px-10 py-3.5 bg-amber-400 hover:bg-amber-500 text-rose-700 rounded-full text-xl font-black border-b-4 border-amber-700 active:border-b-0 active:translate-y-1 shadow-lg transition-all">
                        再玩一次，重返特訓！
                    </button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
